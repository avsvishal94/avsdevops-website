version: "3.9"

services:
  avsdevops-web:
    build:
      context: ..
      dockerfile: microservices/Dockerfile
    image: avsdevops-website:latest
    container_name: avsdevops-web
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
